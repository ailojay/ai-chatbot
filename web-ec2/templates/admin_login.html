<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 400px; margin: 100px auto; padding: 20px; }
    h2 { color: #333; }
    input[type=password] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
    button:hover { background: #0056b3; }
    .error { color: red; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
  <h2>Admin Login</h2>
  <form method="POST">
    <input type="password" name="password" placeholder="Enter admin password" required />
    <button type="submit">Login</button>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
  </form>
</body>
</html>
