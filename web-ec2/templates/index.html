<!DOCTYPE html>
<html>
<head>
  <title>Mama Titi Restaurant Assistant</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
    h2 { color: #333; }
    #chat-box { border: 1px solid #ddd; height: 400px; overflow-y: scroll; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
    .user-msg { text-align: right; margin: 8px 0; }
    .user-msg span { background: #007bff; color: white; padding: 8px 14px; border-radius: 18px; display: inline-block; max-width: 80%; }
    .bot-msg { text-align: left; margin: 8px 0; }
    .bot-msg span { background: #f0f0f0; color: #333; padding: 8px 14px; border-radius: 18px; display: inline-block; max-width: 80%; }
    #input-row { display: flex; gap: 8px; }
    #user-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; font-size: 14px; }
    #send-btn { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 14px; }
    #send-btn:hover { background: #0056b3; }
  </style>
</head>
<body>
  <h2>Mama Titi Restaurant</h2>
  <p>Hi! I'm Titi, your virtual assistant. Ask me anything about our menu, hours, or reservations.</p>
  <div id="chat-box"></div>
  <div id="input-row">
    <input id="user-input" type="text" placeholder="Type your question..." />
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
  <script>
    document.getElementById('user-input').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') sendMessage();
    });

    function sendMessage() {
      const input = document.getElementById('user-input');
      const message = input.value.trim();
      if (!message) return;

      addMessage(message, 'user');
      input.value = '';

      fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: message })
      })
      .then(response => response.json())
      .then(data => { addMessage(data.response, 'bot'); });
    }

    function addMessage(text, sender) {
      const chatBox = document.getElementById('chat-box');
      const div = document.createElement('div');
      div.className = sender + '-msg';
      div.innerHTML = '<span>' + text + '</span>';
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>
</body>
</html>
